

# openEuler publishes ready-made VM qcow2 images (xz-compressed) per release
# under https://repo.openeuler.org/openEuler-<release>/virtual_machine_img/.
VM_VHD_LINK="https://repo.openeuler.org/openEuler-22.03-LTS-SP4/virtual_machine_img/aarch64/openEuler-22.03-LTS-SP4-aarch64.qcow2.xz"
VM_OS_NAME="openeuler"
VM_SSH_PORT=2222
VM_RELEASE=22.03-LTS-SP4

VM_ROOT_PASSWORD=anyvm.org

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="dnf install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fuse-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-utils"

VM_ARCH=aarch64

# QEMU 8.2 TCG aborts with "regime_is_user: code should not be reached"
# (SIGABRT right after GRUB loads the kernel) when the openEuler 6.6 kernel
# enables VHE under -cpu max -- the E20 regimes are only handled in QEMU
# >= 9.0. cortex-a72 (ARMv8.0, no VHE/SVE) sidesteps it; same pin as
# ubuntu-builder 26.04 aarch64 and anyvm.py's runtime default.
VM_CPU_MODEL=cortex-a72
VM_NIC=virtio

# Under TCG aarch64 emulation on the x86 runner the first sshd cold-start
# can take 30-60 s, so the default 10 s ssh-probe timeout reports every
# retry as "connection timeout" and we never detect that sshd is actually
# answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90

# The openEuler VM image ships a preset root password we do not rely on:
# hooks/host_prepareImage.sh bakes in root SSH access (and our own root
# password) with virt-customize before the first boot, and sets SELinux to
# permissive so the injected authorized_keys works regardless of labels.
# hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the
# rest over SSH, so we stay on the serial console instead of fragile VNC OCR.
# aarch64 is emulated (TCG) on the x86 runner, so the build is slow but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp,sshfs,nfs"
