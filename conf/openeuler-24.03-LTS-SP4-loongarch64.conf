

# openEuler publishes ready-made VM qcow2 images (xz-compressed) per release
# under https://repo.openeuler.org/openEuler-<release>/virtual_machine_img/.
# 24.03-LTS-SP4 is the only first-batch release with a loongarch64 image.
VM_VHD_LINK="https://repo.openeuler.org/openEuler-24.03-LTS-SP4/virtual_machine_img/loongarch64/openEuler-24.03-LTS-SP4-loongarch64.qcow2.xz"
VM_OS_NAME="openeuler"
VM_SSH_PORT=2222
VM_RELEASE=24.03-LTS-SP4

VM_ROOT_PASSWORD=anyvm.org

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="dnf install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="fuse-sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-utils"

VM_ARCH=loongarch64
VM_NIC=virtio

# The runner's stock QEMU 8.2 (noble) ships qemu-system-loongarch64 but NOT
# the bundled EDK2 LoongArch firmware (edk2-loongarch64-code.fd) -- QEMU only
# started bundling it in 9.2, and the loongarch virt machine cannot boot a
# UEFI disk image without it. Ship qemu-system-loongarch64 10.2.3 (same
# from-source noble-ABI scheme as ubuntu-builder's riscv64/s390x/ppc64le
# pins, see files/README.md): setup() extracts the tarball and build.py
# launches via VM_QEMU_BIN, with the firmware resolved from the tarball's
# share/qemu directory.
VM_QEMU_TAR="files/qemu-10.2.3-loongarch64-noble.tar.zst"
VM_QEMU_BIN="qemu10-loongarch64/bin/qemu-system-loongarch64"

# Under TCG loongarch64 emulation on the x86 runner the first sshd
# cold-start can take 30-60 s, so the default 10 s ssh-probe timeout
# reports every retry as "connection timeout" and we never detect that
# sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90

# The openEuler VM image ships a preset root password we do not rely on:
# hooks/host_prepareImage.sh bakes in root SSH access (and our own root
# password) with virt-customize before the first boot, and sets SELinux to
# permissive so the injected authorized_keys works regardless of labels.
# hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the
# rest over SSH, so we stay on the serial console instead of fragile VNC OCR.
# loongarch64 is emulated (TCG) on the x86 runner, so the build is slow but
# works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp,sshfs,nfs"
