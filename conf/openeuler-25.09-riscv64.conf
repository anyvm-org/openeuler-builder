

# openEuler publishes ready-made VM qcow2 images (xz-compressed) per release
# under https://repo.openeuler.org/openEuler-<release>/virtual_machine_img/.
# 25.09 is the only first-batch release with a riscv64 image (the LTS lines
# ship no riscv64 VM image). Upstream also publishes RISCV_VIRT_CODE.fd
# beside it (EDK2 UEFI): the image boots via the standard EFI path, which
# build.py's riscv64 u-boot payload reaches through u-boot's EFI fallback
# (same path the ubuntu 24.04/26.04 riscv64 builds use).
VM_VHD_LINK="https://repo.openeuler.org/openEuler-25.09/virtual_machine_img/riscv64/openEuler-25.09-riscv64.qcow2.xz"
VM_OS_NAME="openeuler"
VM_SSH_PORT=2222
VM_RELEASE=25.09

VM_ROOT_PASSWORD=anyvm.org

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="dnf install -y "

VM_RSYNC_PKG="rsync"

# NO sshfs on riscv64: the 25.09 riscv64 port ships no fuse-sshfs/sshfs
# package at all (verified against both the OS and everything repodata
# primary indexes) -- hence no $VM_SSHFS_PKG here and no "sshfs" in
# VM_SYNC_METHODS below.
VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG nfs-utils"

VM_ARCH=riscv64
VM_NIC=virtio

# Under TCG riscv64 emulation on the x86 runner the first sshd cold-start
# can take 30-60 s, so the default 10 s ssh-probe timeout reports every
# retry as "connection timeout" and we never detect that sshd is actually
# answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90

# The openEuler VM image ships a preset root password we do not rely on:
# hooks/host_prepareImage.sh bakes in root SSH access (and our own root
# password) with virt-customize before the first boot, and sets SELinux to
# permissive so the injected authorized_keys works regardless of labels.
# hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the
# rest over SSH, so we stay on the serial console instead of fragile VNC
# OCR. riscv64 is emulated (TCG) on the x86 runner, so the build is slow
# but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp,nfs"
